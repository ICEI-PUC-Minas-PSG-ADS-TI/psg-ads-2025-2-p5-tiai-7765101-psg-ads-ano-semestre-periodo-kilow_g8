spring:
  application:
    name: kilow
  datasource:
    # URL de conexão (ajuste o nome do servidor se necessário)
    url: jdbc:sqlserver://localhost;instanceName=SQLEXPRESS01;databaseName=kilow;encrypt=true;trustServerCertificate=true
    username: kilow_user
    password: kilow
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

api:
  security:
    token:
      secret: ${JWT_SECRET:hoje-e-domingo-pe-de-cachimbo}